<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            color: #ffffff;
            background-image: url('MainBG.png');
            background-size: cover;
            background-attachment: fixed;
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 250px;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            box-sizing: border-box;
            background: rgb(18, 33, 72);
            row-gap: 20px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            display: inline-flex;
            align-items: center;
        }
        nav img.nav-icon { width: 40px; height: auto; margin-right: 8px; }

        h1 {
            margin-left: 300px;
            background-color: #32457e;
            color: #ffffff;
            padding: 25px;
            border-radius: 25px;
            width: 110px;
            border: 2px solid #ffffff;
        }
       .bulletin-board {
           background-image: url('bullet.png');
           background-size: 100% 100%;
           background-repeat: no-repeat;
           display: flex;
           align-items: center;
           justify-content: center;
           gap: 60px;
           margin: 30px auto;
           margin-left: 300px;
           margin-right: auto;
           width: 956px;
           height: 650px;
           padding: 100px 80px;
           box-sizing: border-box;
       }
        .Note {
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            text-align: center;
            color: #2c2c2c;
            font-family: 'Courier New', Courier, monospace;
            width: 200px;
            min-height: 200px;
            background-image: url('TasksNote.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; 
            padding: 20px 20px 30px 20px;
        }
        .Note:hover {
            transform: scale(1.15) translateY(-12px);
        }
        .Note h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: #1a1a1a;
            text-align: center;
            margin-left: 0;
        }
        .Note p {
            font-size: 12px;
            margin: 0 0 16px 0;
            color: #333;
        }
    </style>
</head>
<body>

    <nav>
        <img src="Logo.png" style="width: 165px; height: auto; align-self: center; margin-bottom: 10px;">
        <b><a href="dashboard.html"><img class="nav-icon" src="DashboardIcon.png">Dashboard</a></b>
        <b><a href="tasks.html"style="background-color:rgb(18, 33, 72); width: 250px;padding-top: 25px;padding-bottom: 25px;border-radius: 25px;"><img class="nav-icon" src="TaskIcon.png">Tasks</a></b>
        <b><a href="notebooks.html"><img class="nav-icon" src="NotebookIcon.png">Notebook</a></b>
        <b><a href="profile.html"><img class="nav-icon" src="ProfileIcon.png">Your Profile</a></b>
        <b><a href="index.html"><img class="nav-icon" src="LogoutIcon.png">Logout</a></b>
    </nav>

    <h1>Tasks</h1>

    <div class="bulletin-board">

        <div class="Note" onclick="completeTask()">
            <h3>English</h3>
            <p>Essay Draft<br>Due: May 10, 2026</p>
        </div>

        <div class="Note" onclick="completeTask()">
            <h3>Science</h3>
            <p>Lab Report<br>Due: May 12, 2026</p>
        </div>

        <div class="Note" onclick="completeTask()">
            <h3>Math</h3>
            <p>Problem Set 3<br>Due: May 14, 2026</p>
        </div>

    </div>

    <script>
        function completeTask() {
            alert("Task for completed successfully!");
        }
    </script>

</body>
</html>
