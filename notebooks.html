<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebooks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            color: #ffffff;
            background-image: url('MainBG.png');
            background-size: cover;
            background-attachment: fixed;
        }

        nav {
            position: fixed;
            top: 0; 
            left: 0;
            height: 100%; 
            width: 250px;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            box-sizing: border-box;
            background: rgb(18, 33, 72);
            row-gap: 20px; 
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            display: inline-flex;
            align-items: center;
        }

        nav img.nav-icon { width: 40px; height: auto; margin-right: 8px; }

        h1 { 
            margin-left: 300px;
        }
        
        h1 {
            background-color: #32457e;
            color: #ffffff;
            padding: 25px;
            border-radius: 25px;
            width: 445px;
            border: 2px solid #ffffff;
        }
      
        .notebook-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-left: 300px;
            padding: 40px;
        }

        .notebook-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            text-decoration: none;
            color: white;
        }

        .notebook-item:hover {
            transform: scale(1.12) translateY(-8px);
        }

        .notebook-item img {
            width: 450px;
            height: auto;
        }

        .notebook-item span {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
        }

        p {
            font-size: 25px;
            margin: 0 0 16px 0;
            color: rgb(18, 33, 72);
            font-family: 'Courier New', Courier, monospace;
            background-color: #ffffff;
            border: #32457e65 solid 2px;
            padding: 10px 20px;
            border-radius: 10px;
            width: 410px;
        }

    </style>
</head>
<body>

    <nav>
        <img src="Logo.png" style="width: 165px; height: auto; align-self: center; margin-bottom: 10px;">
        <b><a href="dashboard.html"><img class="nav-icon" src="DashboardIcon.png">Dashboard</a></b>
        <b><a href="tasks.html"><img class="nav-icon" src="TaskIcon.png">Tasks</a></b>
        <b><a href="notebooks.html"style="background-color:rgb(18, 33, 72); width: 250px;padding-top: 25px;padding-bottom: 25px;border-radius: 25px;"><img class="nav-icon" src="NotebookIcon.png">Notebook</a></b>
        <b><a href="profile.html"><img class="nav-icon" src="ProfileIcon.png">Your Profile</a></b>
        <b><a href="index.html"><img class="nav-icon" src="LogoutIcon.png">Logout</a></b>
    </nav>

    <h1>Welcome to the Notebooks!</h1>

    <div class="notebook-grid">
        <a class="notebook-item">
            <img src="ENGNotebook.png">
            <b><p>English</p></b>
        </a>
        <a class="notebook-item">
            <img src="SCINotebook.png">
            <b><p>Science</p></b>
        </a>
        <a class="notebook-item">
            <img src="SSNotebook.png">
            <b><p>Social Studies</p></b>
        </a>
        <a class="notebook-item">
            <img src="VENotebook.png">
            <b><p>Values Education</p></b>
        </a>
    </div>    
</body>
</html>
